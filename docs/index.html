<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madeleine — Live Photos から旅の Vlog を</title>
    <meta name="description" content="Live Photo に隠れた1秒を繋いで、旅の記憶をショートVlogに。">
    <meta property="og:title" content="Madeleine">
    <meta property="og:description" content="Live Photo に隠れた1秒を繋いで、旅の記憶をショートVlogに。">
    <meta property="og:image" content="https://shakshi3104.github.io/Madeleine/assets/icon.png">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        :root {
            --bg: #FAF6EE;
            --text: #3A2A1A;
            --text-soft: #6B5840;
            --accent: #B86F0A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Hero */
        .hero {
            padding: 120px 24px 16px;
            text-align: center;
        }

        .hero img.icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin-bottom: 32px;
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .hero p.tagline {
            font-size: 17px;
            color: var(--text-soft);
        }

        /* Main visual */
        .main-visual {
            padding: 0 24px;
            text-align: center;
        }

        .main-visual img {
            width: 100%;
            max-width: 880px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Features (minimal list) */
        .features {
            padding: 16px 24px 64px;
        }

        .features ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .features li {
            text-align: center;
        }

        .features li strong {
            display: block;
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .features li span {
            font-size: 15px;
            color: var(--text-soft);
        }

        /* Footer */
        footer {
            padding: 64px 24px 48px;
            text-align: center;
            color: var(--text-soft);
            font-size: 13px;
        }

        footer .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        footer a {
            color: var(--text-soft);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--accent);
        }

        footer .copyright {
            font-size: 12px;
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero {
                padding: 80px 24px 32px;
            }
            .hero h1 {
                font-size: 32px;
            }
            .hero p.tagline {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<header class="hero">
    <img class="icon" src="assets/icon.png" alt="Madeleine icon">
    <h1>Madeleine</h1>
    <p class="tagline">Live Photo に隠れた1秒を繋いで、<br>旅の記憶をショート Vlog に。</p>
</header>

<section class="main-visual">
    <img src="assets/madeleine-main-image.png" alt="Madeleine app screens">
</section>

<section class="features container">
    <ul>
        <li>
            <strong>隠れた動画を取り出す</strong>
            <span>Live Photo の動画部分を自動で抽出</span>
        </li>
        <li>
            <strong>1日を1本に繋ぐ</strong>
            <span>撮影日時順に並べて、1秒ずつ連結</span>
        </li>
        <li>
            <strong>すべては端末の中で</strong>
            <span>外部送信なし。あなたの写真はあなたのもの</span>
        </li>
    </ul>
</section>

<footer>
    <div class="links">
        <a href="https://github.com/Shakshi3104/Madeleine">GitHub</a>
        <a href="privacy.html">Privacy</a>
        <a href="https://github.com/Shakshi3104/Madeleine/issues">Support</a>
    </div>
    <p class="copyright">© 2026 Shakshi3104</p>
</footer>

</body>
</html>
